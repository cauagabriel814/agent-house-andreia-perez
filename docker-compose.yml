# ============================================================
# docker-compose.yml — Andreia / Residere Agent
# Serviços: migration, api, worker
# Postgres e RabbitMQ são externos (já provisionados no servidor)
# ============================================================
services:

  # ----------------------------------------------------------
  # Migration — roda alembic upgrade head e sai
  # Usa URL síncrona (psycopg2) porque o Alembic não suporta asyncpg
  # ----------------------------------------------------------
  migration:
    build: .
    command: alembic upgrade head
    environment:
      POSTGRES_HOST:
      POSTGRES_PORT:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
    restart: on-failure

  # ----------------------------------------------------------
  # API — FastAPI via Uvicorn
  # ----------------------------------------------------------
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    environment:
      POSTGRES_HOST:
      POSTGRES_PORT:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      RABBITMQ_HOST:
      RABBITMQ_PORT:
      RABBITMQ_USER:
      RABBITMQ_PASSWORD:
      APP_ENV:
      DEBUG:
      WEBHOOK_SECRET:
      OPENAI_API_KEY:
      LANGCHAIN_TRACING_V2:
      LANGCHAIN_API_KEY:
      LANGCHAIN_PROJECT:
      UAZAPI_BASE_URL:
      UAZAPI_TOKEN:
      UAZAPI_INSTANCE_ID:
      KOMMO_SUBDOMAIN:
      KOMMO_ACCESS_TOKEN:
      KOMMO_PIPELINE_ID:
      KOMMO_STAGE_MAP:
      EMAIL_SMTP_HOST:
      EMAIL_SMTP_PORT:
      EMAIL_SMTP_USER:
      EMAIL_SMTP_PASSWORD:
      EMAIL_FROM:
      EMAIL_FROM_NAME:
      EMAIL_CORRETOR:
      EMAIL_ESPECIALISTA_LANCAMENTO:
      CORRETOR_PHONES:
      JWT_SECRET_KEY:
      APPOINTMENT_BASE_URL:
      APPOINTMENT_API_KEY:
    depends_on:
      - migration
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Worker — Consumer RabbitMQ + Scheduler de jobs
  # ----------------------------------------------------------
  worker:
    build: .
    command: python worker.py
    environment:
      POSTGRES_HOST:
      POSTGRES_PORT:
      POSTGRES_DB:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      RABBITMQ_HOST:
      RABBITMQ_PORT:
      RABBITMQ_USER:
      RABBITMQ_PASSWORD:
      APP_ENV:
      DEBUG:
      OPENAI_API_KEY:
      LANGCHAIN_TRACING_V2:
      LANGCHAIN_API_KEY:
      LANGCHAIN_PROJECT:
      UAZAPI_BASE_URL:
      UAZAPI_TOKEN:
      UAZAPI_INSTANCE_ID:
      KOMMO_SUBDOMAIN:
      KOMMO_ACCESS_TOKEN:
      KOMMO_PIPELINE_ID:
      KOMMO_STAGE_MAP:
      EMAIL_SMTP_HOST:
      EMAIL_SMTP_PORT:
      EMAIL_SMTP_USER:
      EMAIL_SMTP_PASSWORD:
      EMAIL_FROM:
      EMAIL_FROM_NAME:
      EMAIL_CORRETOR:
      EMAIL_ESPECIALISTA_LANCAMENTO:
      CORRETOR_PHONES:
      APPOINTMENT_BASE_URL:
      APPOINTMENT_API_KEY:
    volumes:
      - chroma_data:/app/data/chroma
    depends_on:
      - migration
    restart: unless-stopped

# ----------------------------------------------------------------
# Volumes persistentes
# ----------------------------------------------------------------
volumes:
  chroma_data:
